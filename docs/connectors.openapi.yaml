openapi: 3.1.0
info:
  title: Pulse Connectors API
  version: 1.0.0
  description: Organization-scoped API for provider-agnostic notification connectors.
servers:
  - url: /
security:
  - bearerAuth: []
tags:
  - name: Connectors
  - name: Connector Operations
  - name: Connector Deliveries
  - name: Connector Routes
  - name: Connector OAuth
  - name: Connector Audit
paths:
  /organizations/{orgId}/connectors/types:
    get:
      tags: [Connectors]
      summary: List registered connector provider types.
      parameters: [$ref: '#/components/parameters/OrgId']
      responses:
        '200': {$ref: '#/components/responses/ConnectorTypes'}
  /organizations/{orgId}/connectors:
    post:
      tags: [Connectors]
      summary: Create a connector.
      parameters: [$ref: '#/components/parameters/OrgId']
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/CreateConnector'}
      responses:
        '201': {$ref: '#/components/responses/Connector'}
    get:
      tags: [Connectors]
      summary: List connectors.
      parameters:
        - $ref: '#/components/parameters/OrgId'
        - {name: type, in: query, schema: {$ref: '#/components/schemas/ConnectorType'}}
        - {name: status, in: query, schema: {$ref: '#/components/schemas/ConnectorStatus'}}
        - {name: search, in: query, schema: {type: string}}
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200': {$ref: '#/components/responses/ConnectorList'}
  /organizations/{orgId}/connectors/{id}:
    get:
      tags: [Connectors]
      summary: Get a connector.
      parameters: [$ref: '#/components/parameters/OrgId', $ref: '#/components/parameters/ConnectorId']
      responses:
        '200': {$ref: '#/components/responses/Connector'}
    patch:
      tags: [Connectors]
      summary: Update a connector.
      parameters: [$ref: '#/components/parameters/OrgId', $ref: '#/components/parameters/ConnectorId']
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/UpdateConnector'}
      responses:
        '200': {$ref: '#/components/responses/Connector'}
    delete:
      tags: [Connectors]
      summary: Soft-delete a connector.
      parameters: [$ref: '#/components/parameters/OrgId', $ref: '#/components/parameters/ConnectorId']
      responses:
        '204': {description: Deleted}
  /organizations/{orgId}/connectors/{id}/details:
    get:
      tags: [Connectors]
      summary: Get connector details.
      parameters: [$ref: '#/components/parameters/OrgId', $ref: '#/components/parameters/ConnectorId']
      responses:
        '200': {$ref: '#/components/responses/Connector'}
  /organizations/{orgId}/connectors/{id}/enable:
    post:
      tags: [Connectors]
      summary: Enable a connector.
      parameters: [$ref: '#/components/parameters/OrgId', $ref: '#/components/parameters/ConnectorId']
      responses:
        '200': {$ref: '#/components/responses/Connector'}
  /organizations/{orgId}/connectors/{id}/disable:
    post:
      tags: [Connectors]
      summary: Disable a connector.
      parameters: [$ref: '#/components/parameters/OrgId', $ref: '#/components/parameters/ConnectorId']
      responses:
        '200': {$ref: '#/components/responses/Connector'}
  /organizations/{orgId}/connectors/{id}/rotate-secret:
    post:
      tags: [Connector Operations]
      summary: Rotate connector credentials.
      parameters: [$ref: '#/components/parameters/OrgId', $ref: '#/components/parameters/ConnectorId']
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [config]
              properties:
                config: {$ref: '#/components/schemas/ProviderConfig'}
      responses:
        '200': {$ref: '#/components/responses/Connector'}
  /organizations/{orgId}/connectors/{id}/test:
    post:
      tags: [Connector Operations]
      summary: Test provider connectivity.
      parameters: [$ref: '#/components/parameters/OrgId', $ref: '#/components/parameters/ConnectorId']
      responses:
        '200': {$ref: '#/components/responses/ConnectionTest'}
  /organizations/{orgId}/connectors/{id}/health-check:
    post:
      tags: [Connector Operations]
      summary: Run an immediate health check.
      parameters: [$ref: '#/components/parameters/OrgId', $ref: '#/components/parameters/ConnectorId']
      responses:
        '200': {$ref: '#/components/responses/HealthStatus'}
  /organizations/{orgId}/connectors/{id}/health-history:
    get:
      tags: [Connector Operations]
      summary: List connector health checks.
      parameters: [$ref: '#/components/parameters/OrgId', $ref: '#/components/parameters/ConnectorId', $ref: '#/components/parameters/Limit', $ref: '#/components/parameters/Offset']
      responses:
        '200': {$ref: '#/components/responses/HealthList'}
  /organizations/{orgId}/connectors/{id}/test-runs:
    get:
      tags: [Connector Operations]
      summary: List connector test runs.
      parameters: [$ref: '#/components/parameters/OrgId', $ref: '#/components/parameters/ConnectorId', $ref: '#/components/parameters/Limit', $ref: '#/components/parameters/Offset']
      responses:
        '200': {$ref: '#/components/responses/TestRunList'}
  /organizations/{orgId}/connectors/{id}/send:
    post:
      tags: [Connector Operations]
      summary: Send a test notification.
      parameters: [$ref: '#/components/parameters/OrgId', $ref: '#/components/parameters/ConnectorId']
      requestBody:
        required: false
        content:
          application/json:
            schema: {$ref: '#/components/schemas/SendNotification'}
      responses:
        '200': {$ref: '#/components/responses/DispatchSummary'}
        '502': {$ref: '#/components/responses/DispatchSummary'}
  /organizations/{orgId}/connectors/{id}/deliveries:
    get:
      tags: [Connector Deliveries]
      summary: List delivery history for a connector.
      parameters: [$ref: '#/components/parameters/OrgId', $ref: '#/components/parameters/ConnectorId', $ref: '#/components/parameters/Limit', $ref: '#/components/parameters/Offset']
      responses:
        '200': {$ref: '#/components/responses/DeliveryList'}
  /organizations/{orgId}/connectors/deliveries/{deliveryId}:
    get:
      tags: [Connector Deliveries]
      summary: Get one delivery.
      parameters: [$ref: '#/components/parameters/OrgId', $ref: '#/components/parameters/DeliveryId']
      responses:
        '200': {$ref: '#/components/responses/Delivery'}
  /organizations/{orgId}/connectors/deliveries/{deliveryId}/retry:
    post:
      tags: [Connector Deliveries]
      summary: Request delivery retry.
      parameters: [$ref: '#/components/parameters/OrgId', $ref: '#/components/parameters/DeliveryId']
      responses:
        '200': {$ref: '#/components/responses/Delivery'}
  /organizations/{orgId}/connectors/{id}/deliveries/{deliveryId}/attempts:
    get:
      tags: [Connector Deliveries]
      summary: List delivery attempts.
      parameters: [$ref: '#/components/parameters/OrgId', $ref: '#/components/parameters/ConnectorId', $ref: '#/components/parameters/DeliveryId', $ref: '#/components/parameters/Limit', $ref: '#/components/parameters/Offset']
      responses:
        '200': {$ref: '#/components/responses/AttemptList'}
  /organizations/{orgId}/connectors/{id}/audit:
    get:
      tags: [Connector Audit]
      summary: List audit rows for a connector.
      parameters: [$ref: '#/components/parameters/OrgId', $ref: '#/components/parameters/ConnectorId', $ref: '#/components/parameters/Limit', $ref: '#/components/parameters/Offset']
      responses:
        '200': {$ref: '#/components/responses/AuditList'}
  /organizations/{orgId}/connectors/audit:
    get:
      tags: [Connector Audit]
      summary: List organization connector audit rows.
      parameters: [$ref: '#/components/parameters/OrgId', $ref: '#/components/parameters/Limit', $ref: '#/components/parameters/Offset']
      responses:
        '200': {$ref: '#/components/responses/AuditList'}
  /organizations/{orgId}/connectors/{id}/routes:
    post:
      tags: [Connector Routes]
      summary: Create a connector route.
      parameters: [$ref: '#/components/parameters/OrgId', $ref: '#/components/parameters/ConnectorId']
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/ConnectorRouteInput'}
      responses:
        '201': {$ref: '#/components/responses/ConnectorRoute'}
    get:
      tags: [Connector Routes]
      summary: List connector routes.
      parameters: [$ref: '#/components/parameters/OrgId', $ref: '#/components/parameters/ConnectorId', $ref: '#/components/parameters/Limit', $ref: '#/components/parameters/Offset']
      responses:
        '200': {$ref: '#/components/responses/ConnectorRouteList'}
  /organizations/{orgId}/connectors/{id}/routes/{routeId}:
    patch:
      tags: [Connector Routes]
      summary: Update a connector route.
      parameters: [$ref: '#/components/parameters/OrgId', $ref: '#/components/parameters/ConnectorId', $ref: '#/components/parameters/RouteId']
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/ConnectorRoutePatch'}
      responses:
        '200': {$ref: '#/components/responses/ConnectorRoute'}
    delete:
      tags: [Connector Routes]
      summary: Delete a connector route.
      parameters: [$ref: '#/components/parameters/OrgId', $ref: '#/components/parameters/ConnectorId', $ref: '#/components/parameters/RouteId']
      responses:
        '204': {description: Deleted}
  /organizations/{orgId}/connectors/{id}/oauth/start:
    post:
      tags: [Connector OAuth]
      summary: Start OAuth state and PKCE flow.
      parameters: [$ref: '#/components/parameters/OrgId', $ref: '#/components/parameters/ConnectorId']
      responses:
        '200': {$ref: '#/components/responses/OAuthStart'}
  /organizations/{orgId}/connectors/{id}/oauth/callback:
    post:
      tags: [Connector OAuth]
      summary: Validate and consume OAuth callback state.
      parameters: [$ref: '#/components/parameters/OrgId', $ref: '#/components/parameters/ConnectorId']
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/OAuthCallback'}
      responses:
        '200':
          description: OAuth callback result.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [connected, refreshQueued]
                        properties:
                          connected: {type: boolean}
                          refreshQueued: {type: boolean}
                          refreshJobId: {type: [string, 'null']}
  /organizations/{orgId}/connectors/{id}/oauth/refresh:
    post:
      tags: [Connector OAuth]
      summary: Request OAuth credential refresh.
      parameters: [$ref: '#/components/parameters/OrgId', $ref: '#/components/parameters/ConnectorId']
      responses:
        '200': {$ref: '#/components/responses/Queued'}
  /organizations/{orgId}/connectors/{id}/oauth/disconnect:
    post:
      tags: [Connector OAuth]
      summary: Revoke stored OAuth credentials.
      description: Archives the current OAuth credential version, replaces the live credential with an encrypted revoked marker, and marks the connector revoked.
      parameters: [$ref: '#/components/parameters/OrgId', $ref: '#/components/parameters/ConnectorId']
      responses:
        '200':
          description: Disconnect result.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [disconnected]
                        properties:
                          disconnected: {type: boolean}
  /organizations/{orgId}/connectors/preview:
    post:
      tags: [Connector Operations]
      summary: Preview normalized notification payload.
      parameters: [$ref: '#/components/parameters/OrgId']
      requestBody:
        required: false
        content:
          application/json:
            schema: {$ref: '#/components/schemas/SendNotification'}
      responses:
        '200':
          description: Preview payload.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data: {$ref: '#/components/schemas/PreviewNotification'}
  /organizations/{orgId}/connectors/validate-configuration:
    post:
      tags: [Connector Operations]
      summary: Validate provider configuration without saving.
      parameters: [$ref: '#/components/parameters/OrgId']
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type, config]
              properties:
                type: {$ref: '#/components/schemas/ConnectorType'}
                config: {$ref: '#/components/schemas/ProviderConfig'}
      responses:
        '200':
          description: Validation result.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data: {$ref: '#/components/schemas/ValidationResult'}
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    OrgId: {name: orgId, in: path, required: true, schema: {type: string, format: uuid}}
    ConnectorId: {name: id, in: path, required: true, schema: {type: string, format: uuid}}
    DeliveryId: {name: deliveryId, in: path, required: true, schema: {type: string, format: uuid}}
    RouteId: {name: routeId, in: path, required: true, schema: {type: string, format: uuid}}
    Limit: {name: limit, in: query, schema: {type: integer, minimum: 1, maximum: 100, default: 25}}
    Offset: {name: offset, in: query, schema: {type: integer, minimum: 0, default: 0}}
  schemas:
    ConnectorType:
      type: string
      enum: [slack, discord, teams, pagerduty, webhook, email, sms]
    ConnectorStatus:
      type: string
      enum: [pending_setup, active, inactive, disabled, expired, revoked, degraded, error, rate_limited]
    Severity:
      type: string
      enum: [info, warning, error, critical]
    ConnectorRouteEnvironment:
      type: string
      enum: [development, staging, production]
    ProviderConfig:
      type: object
      additionalProperties: true
    SuccessEnvelope:
      type: object
      required: [success]
      properties:
        success: {type: boolean, const: true}
    ErrorEnvelope:
      type: object
      required: [success, error]
      properties:
        success: {type: boolean, const: false}
        error:
          type: object
          required: [code, message]
          properties:
            code: {type: string}
            message: {type: string}
            details: {type: object, additionalProperties: true}
    Connector:
      type: object
      required: [id, organizationId, name, type, status, capabilities, rateLimit, retry, health, metadata, createdAt, updatedAt]
      properties:
        id: {type: string, format: uuid}
        organizationId: {type: string, format: uuid}
        name: {type: string}
        type: {$ref: '#/components/schemas/ConnectorType'}
        status: {$ref: '#/components/schemas/ConnectorStatus'}
        description: {type: [string, 'null']}
        displayConfig: {type: object, additionalProperties: true}
        capabilities:
          type: object
          properties:
            richFormatting: {type: boolean}
            threading: {type: boolean}
            attachments: {type: boolean}
        rateLimit:
          type: object
          properties:
            requests: {type: integer}
            windowSeconds: {type: integer}
        retry:
          type: object
          properties:
            maxRetries: {type: integer}
            backoffBaseMs: {type: integer}
            backoffMultiplier: {type: number}
        health:
          type: object
          properties:
            lastHealthCheckAt: {type: [string, 'null'], format: date-time}
            lastSuccessfulDeliveryAt: {type: [string, 'null'], format: date-time}
            consecutiveFailures: {type: integer}
            failureThreshold: {type: integer}
        metadata: {type: object, additionalProperties: true}
        createdAt: {type: string, format: date-time}
        updatedAt: {type: string, format: date-time}
    CreateConnector:
      type: object
      required: [name, type, config]
      properties:
        name: {type: string, minLength: 1}
        type: {$ref: '#/components/schemas/ConnectorType'}
        description: {type: string}
        config: {$ref: '#/components/schemas/ProviderConfig'}
        displayConfig: {type: object, additionalProperties: true}
        rateLimitRequests: {type: integer, minimum: 1}
        rateLimitWindowSeconds: {type: integer, minimum: 1}
        maxRetries: {type: integer, minimum: 0}
        failureThreshold: {type: integer, minimum: 1}
        metadata: {type: object, additionalProperties: true}
    UpdateConnector:
      type: object
      properties:
        name: {type: string, minLength: 1}
        description: {type: [string, 'null']}
        status: {$ref: '#/components/schemas/ConnectorStatus'}
        config: {$ref: '#/components/schemas/ProviderConfig'}
        displayConfig: {type: object, additionalProperties: true}
        rateLimitRequests: {type: integer, minimum: 1}
        rateLimitWindowSeconds: {type: integer, minimum: 1}
        maxRetries: {type: integer, minimum: 0}
        failureThreshold: {type: integer, minimum: 1}
        metadata: {type: object, additionalProperties: true}
    SendNotification:
      type: object
      properties:
        notificationType: {type: string, default: test}
        severity: {$ref: '#/components/schemas/Severity'}
        title: {type: string}
        body: {type: string}
        url: {type: string}
        fields:
          type: array
          items:
            type: object
            properties:
              label: {type: string}
              value: {type: string}
              short: {type: boolean}
        metadata: {type: object, additionalProperties: true}
    Delivery:
      type: object
      properties:
        id: {type: string, format: uuid}
        connectorId: {type: string, format: uuid}
        notificationType: {type: string}
        severity: {$ref: '#/components/schemas/Severity'}
        status: {type: string}
        attempts: {type: integer}
        maxAttempts: {type: integer}
        retryCount: {type: integer}
        nextRetryAt: {type: [string, 'null'], format: date-time}
        externalMessageId: {type: [string, 'null']}
        responseStatusCode: {type: [integer, 'null']}
        errorMessage: {type: [string, 'null']}
        latencyMs: {type: [integer, 'null']}
        correlationId: {type: string}
        createdAt: {type: string, format: date-time}
        sentAt: {type: [string, 'null'], format: date-time}
        deliveredAt: {type: [string, 'null'], format: date-time}
        payload: {type: object, additionalProperties: true}
    ConnectorRouteInput:
      type: object
      required: [eventType]
      properties:
        projectId: {type: [string, 'null'], format: uuid}
        environment:
          oneOf:
            - $ref: '#/components/schemas/ConnectorRouteEnvironment'
            - type: 'null'
        eventType: {type: string}
        severity: {$ref: '#/components/schemas/Severity'}
        enabled: {type: boolean}
    ConnectorRoutePatch:
      type: object
      properties:
        projectId: {type: [string, 'null'], format: uuid}
        environment:
          oneOf:
            - $ref: '#/components/schemas/ConnectorRouteEnvironment'
            - type: 'null'
        eventType: {type: string}
        severity: {$ref: '#/components/schemas/Severity'}
        enabled: {type: boolean}
    OAuthCallback:
      type: object
      required: [state]
      properties:
        state: {type: string}
        code: {type: string}
        error: {type: string}
        accessToken:
          type: string
          description: Provider access token. Stored encrypted and never returned.
        refreshToken:
          type: string
          description: Provider refresh token. Stored encrypted and never returned.
        tokenType:
          type: string
          default: Bearer
        scope:
          type: string
        expiresIn:
          type: integer
          minimum: 1
          maximum: 31536000
        expiresAt:
          type: string
          format: date-time
    HealthStatus:
      type: object
      required: [state, checkedAt]
      properties:
        state: {type: string, enum: [healthy, degraded, unhealthy]}
        responseTimeMs: {type: integer}
        message: {type: string}
        checkedAt: {type: string, format: date-time}
        details: {type: object, additionalProperties: true}
    ConnectorTestRun:
      type: object
      required: [id, connectorId, status, response, durationMs, createdAt]
      properties:
        id: {type: string, format: uuid}
        connectorId: {type: string, format: uuid}
        status: {type: string}
        response: {type: [object, 'null'], additionalProperties: true}
        durationMs: {type: [integer, 'null']}
        createdAt: {type: string, format: date-time}
    DispatchSummary:
      type: object
      required: [deliveryId, status, correlationId, success]
      properties:
        deliveryId: {type: string, format: uuid}
        status: {type: string}
        correlationId: {type: string}
        success: {type: boolean}
        externalMessageId: {type: string}
        errorMessage: {type: string}
    DeliveryAttempt:
      type: object
      required: [id, deliveryId, deliveryCreatedAt, attemptNumber, status, httpStatus, errorCode, errorMessage, response, durationMs, attemptedAt]
      properties:
        id: {type: string, format: uuid}
        deliveryId: {type: string, format: uuid}
        deliveryCreatedAt: {type: string, format: date-time}
        attemptNumber: {type: integer}
        status: {type: string}
        httpStatus: {type: [integer, 'null']}
        errorCode: {type: [string, 'null']}
        errorMessage: {type: [string, 'null']}
        response: {type: [object, 'null'], additionalProperties: true}
        durationMs: {type: [integer, 'null']}
        attemptedAt: {type: string, format: date-time}
    AuditLog:
      type: object
      required: [id, connectorId, action, actorId, actorType, changesSummary, createdAt]
      properties:
        id: {type: string, format: uuid}
        connectorId: {type: [string, 'null'], format: uuid}
        action: {type: string}
        actorId: {type: [string, 'null'], format: uuid}
        actorType: {type: [string, 'null']}
        changesSummary: {type: [object, 'null'], additionalProperties: true}
        createdAt: {type: string, format: date-time}
    ConnectorRoute:
      type: object
      required: [id, connectorId, projectId, environment, eventType, severity, enabled, createdAt]
      properties:
        id: {type: string, format: uuid}
        connectorId: {type: string, format: uuid}
        projectId: {type: [string, 'null'], format: uuid}
        environment:
          oneOf:
            - $ref: '#/components/schemas/ConnectorRouteEnvironment'
            - type: 'null'
        eventType: {type: string}
        severity:
          oneOf:
            - $ref: '#/components/schemas/Severity'
            - type: 'null'
        enabled: {type: boolean}
        createdAt: {type: string, format: date-time}
    OAuthStart:
      type: object
      required: [state, codeChallenge, codeChallengeMethod, expiresAt]
      properties:
        state: {type: string}
        codeChallenge: {type: string}
        codeChallengeMethod: {type: string, enum: [S256]}
        expiresAt: {type: string, format: date-time}
    ValidationResult:
      type: object
      required: [valid, errors]
      properties:
        valid: {type: boolean}
        errors: {type: array, items: {type: string}}
        normalized: {type: object, additionalProperties: true}
    PreviewNotification:
      type: object
      required: [notificationType, severity, title, body, fields, url, metadata]
      properties:
        notificationType: {type: string}
        severity: {$ref: '#/components/schemas/Severity'}
        title: {type: string}
        body: {type: string}
        fields:
          type: array
          items:
            type: object
            properties:
              label: {type: string}
              value: {type: string}
              short: {type: boolean}
        url: {type: [string, 'null']}
        metadata: {type: object, additionalProperties: true}
  responses:
    Connector:
      description: Connector response.
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/SuccessEnvelope'
              - type: object
                properties:
                  data: {$ref: '#/components/schemas/Connector'}
    ConnectorList:
      description: Connector list response.
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/SuccessEnvelope'
              - type: object
                properties:
                  data: {type: array, items: {$ref: '#/components/schemas/Connector'}}
                  meta: {$ref: '#/components/schemas/ProviderConfig'}
    ConnectorTypes:
      description: Connector type catalog.
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/SuccessEnvelope'
              - type: object
                properties:
                  data: {type: array, items: {$ref: '#/components/schemas/ProviderConfig'}}
    ConnectionTest:
      description: Connection test result.
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/SuccessEnvelope'
              - type: object
                properties:
                  data:
                    type: object
                    required: [success, message, latencyMs]
                    properties:
                      success: {type: boolean}
                      message: {type: string}
                      latencyMs: {type: integer}
                      details: {type: object, additionalProperties: true}
    HealthStatus:
      description: Health status result.
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/SuccessEnvelope'
              - type: object
                properties:
